services:
  rivera:
    build: .
    image: rivera:latest
    container_name: rivera
    ports:
      - "8000:8000"
    # Load RIVERA_API_KEY and any overrides from your local .env file.
    # Copy .env.example → .env and fill in your key before running.
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
